name: Ledger
options:
  bundleIdPrefix: com.naveen8f23
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"

configs:
  Debug: debug
  Release: release

targets:
  Ledger:
    type: application
    platform: iOS
    sources:
      - path: Ledger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.naveen8f23.Ledger
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Without this, a colorset literally named "AccentColor" in Assets.xcassets is *not*
        # enough on its own — confirmed the hard way: it compiled into Assets.car correctly
        # (checked via `assetutil`) but `Color.accentColor`/system tint (tab bar selection, nav
        # bar buttons) still rendered plain system blue until this setting was added.
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.0"
    info:
      path: Ledger/Info.plist
      properties:
        CFBundleDisplayName: Ledger
        # A plain empty launch screen defaults to a white background — a jarring flash before
        # the always-dark UI (see LedgerApp.swift's `.preferredColorScheme(.dark)`) appears.
        # Black matches dark mode's actual `.systemBackground`/`.systemGroupedBackground` exactly,
        # so the transition is seamless rather than merely "close enough."
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # The backend (REQUIREMENTS.md MOB-5) is reachable only over the owner's private
        # Tailscale network, has no TLS certificate, and its hostname is entered by the owner at
        # runtime (I3) rather than known at build time, so a scoped ATS exception isn't possible.
        # Ledger is never App-Store distributed (free Xcode signing only, ADR-0024), so App
        # Store ATS review doesn't apply. Revisit if the backend ever gets a real TLS cert.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # BACKLOG.md M3 — required for a BGAppRefreshTask to ever be scheduled/run at all; this is
        # the registration surface, not a promise the system actually grants time (it usually
        # doesn't more than a few times a day, per ADR-0024's own "best-effort" framing).
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.naveen8f23.Ledger.refresh

  LedgerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LedgerTests
    dependencies:
      - target: Ledger
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

  # Not a BACKLOG.md story — a demo/verification aid only, since this environment has no GUI
  # automation access (no macOS Accessibility permission for System Events). XCUITest drives the
  # simulator through Xcode's own test-runner mechanism instead, which doesn't need that
  # permission, and lets a walkthrough be captured with real taps rather than manual defaults-
  # writes. Safe to delete later if it's no longer useful.
  LedgerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LedgerUITests
    dependencies:
      - target: Ledger
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Ledger

schemes:
  Ledger:
    build:
      targets:
        Ledger: all
        LedgerTests: [test]
        LedgerUITests: [test]
    test:
      targets:
        - LedgerTests
        - LedgerUITests
    run:
      config: Debug
